# Blueprint Render — ajuste o nome do serviço se quiser.
# No painel: conecte o repositório, confira "Root Directory" = server (ou use este arquivo).
version: "1"
services:
  - type: web
    name: controle-financeiro-api
    runtime: node
    rootDir: server
    # Gera client/dist (interface) + server/dist (API) no mesmo serviço
    buildCommand: cd .. && npm install --include=dev && VITE_API_BASE= npm run build -w client && cd server && npx prisma generate && npm run db:migrate && npm run build
    startCommand: npm start
    healthCheckPath: /health
